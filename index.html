<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICO Health: Fixed Adventure</title>
    <style>
        :root {
            --pico-bg: #f5f5f5;
            --pico-dark: #333;
            --pico-hero: #4ea5ff;
            --pico-door: #ff7bac;
            --pico-spike: #e74c3c;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: var(--pico-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #ui {
            text-align: center;
            width: 800px;
            margin-bottom: 10px;
        }

        #question-box {
            background: var(--pico-dark);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            box-shadow: 0 4px 0px #000;
            min-height: 25px;
        }

        canvas {
            background-color: white;
            border: 6px solid var(--pico-dark);
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="question-box">按任意鍵開始遊戲</div>
    <p>控制：← → 移動 ｜ ↑ 跳躍 ｜ 避開尖刺，尋找正確金幣！</p>
</div>

<canvas id="game-canvas" width="800" height="500"></canvas>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    const levels = [
        { q: "成人每日建議飲水量是體重(kg)乘以多少？", options: ["10ml", "20ml", "30-35ml", "100ml"], correct: 2 },
        { q: "下列哪種運動最能增進心肺功能？", options: ["看電視", "慢跑", "睡覺", "下棋"], correct: 1 },
        { q: "洗手「內外夾弓大立腕」，最後是？", options: ["指甲", "手指", "手掌", "手腕"], correct: 3 },
        { q: "預防近視，用眼30分鐘應休息多久？", options: ["1分鐘", "10分鐘", "30分鐘", "不必休息"], correct: 1 }
    ];

    let currentLevel = 0;
    let doorOpen = false;
    let gameStarted = false;
    let platforms = [];
    let coins = [];
    let spikes = [];
    let doorPos = { x: 0, y: 0 };
    
    const player = {
        x: 0, y: 0, vx: 0, vy: 0, size: 30,
        onGround: false, speed: 4.5, jumpPower: -11.5
    };

    const keys = {};

    function generateMap() {
        platforms = [];
        coins = [];
        spikes = [];
        
        // 1. 起點平台 (絕對安全區)
        platforms.push({ x: 0, y: 150, w: 300, h: 15 });
        
        // 2. 隨機中層平台
        platforms.push({ x: 200, y: 300, w: 400, h: 15 });
        
        // 3. 隨機底層平台
        platforms.push({ x: 0, y: 450, w: 800, h: 15 });

        // 生成尖刺 (避開起點平台)
        const possiblePlats = platforms.slice(1); // 排除第一層
        for (let i = 0; i < 3; i++) {
            const p = possiblePlats[Math.floor(Math.random() * possiblePlats.length)];
            spikes.push({
                x: p.x + 50 + Math.random() * (p.w - 100),
                y: p.y - 15,
                w: 20, h: 15
            });
        }

        // 生成答案金幣 (避開起點與尖刺)
        const data = levels[currentLevel];
        data.options.forEach((opt, i) => {
            const p = possiblePlats[Math.floor(Math.random() * possiblePlats.length)];
            let coinX;
            let isValid = false;
            let attempts = 0;

            while(!isValid && attempts < 10) {
                coinX = p.x + 20 + Math.random() * (p.w - 60);
                // 檢查是否跟尖刺太近
                isValid = !spikes.some(s => Math.abs(s.x - coinX) < 60);
                attempts++;
            }

            coins.push({
                x: coinX,
                y: p.y - 40,
                text: opt,
                isCorrect: i === data.correct,
                collected: false
            });
        });

        doorPos.x = 720;
        doorPos.y = 450 - 70;

        player.x = 50;
        player.y = 150 - 40;
        player.vx = 0; player.vy = 0;
    }

    function initLevel() {
        doorOpen = false;
        generateMap();
        document.getElementById('question-box').innerText = levels[currentLevel].q;
        document.getElementById('question-box').style.backgroundColor = "#333";
    }

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (!gameStarted) {
            gameStarted = true;
            initLevel();
            requestAnimationFrame(gameLoop);
        }
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function update() {
        if (keys['ArrowLeft']) player.vx = -player.speed;
        else if (keys['ArrowRight']) player.vx = player.speed;
        else player.vx *= 0.8;

        if (keys['ArrowUp'] && player.onGround) {
            player.vy = player.jumpPower;
            player.onGround = false;
        }

        player.vy += 0.55;
        player.x += player.vx;
        player.y += player.vy;
        player.onGround = false;

        platforms.forEach(p => {
            if (player.x + player.size > p.x && player.x < p.x + p.w &&
                player.y + player.size > p.y && player.y + player.size < p.y + p.h + 10 && player.vy >= 0) {
                player.y = p.y - player.size;
                player.vy = 0;
                player.onGround = true;
            }
        });

        spikes.forEach(s => {
            if (player.x + player.size > s.x && player.x < s.x + s.w &&
                player.y + player.size > s.y && player.y < s.y + s.h) {
                initLevel(); // 直接重來，不跳彈窗
            }
        });

        coins.forEach(c => {
            if (!c.collected && Math.abs(player.x - c.x) < 30 && Math.abs(player.y - c.y) < 40) {
                if (c.isCorrect) {
                    c.collected = true;
                    doorOpen = true;
                    document.getElementById('question-box').innerText = "正確！門已開啟！";
                    document.getElementById('question-box').style.backgroundColor = "#2ecc71";
                } else {
                    c.collected = true; // 碰錯就消失，不會再干擾
                    const box = document.getElementById('question-box');
                    box.innerText = "答錯囉，找別顆！";
                    box.style.backgroundColor = "#e74c3c";
                    setTimeout(() => {
                        if(!doorOpen) {
                            box.innerText = levels[currentLevel].q;
                            box.style.backgroundColor = "#333";
                        }
                    }, 1500);
                }
            }
        });

        if (player.y > 500) initLevel();
        if (player.x < 0) player.x = 0;
        if (player.x > 800 - player.size) player.x = 800 - player.size;

        if (doorOpen && Math.abs(player.x - doorPos.x) < 40 && player.y > 350) {
            currentLevel++;
            if (currentLevel < levels.length) initLevel();
            else { alert("恭喜通關！"); currentLevel = 0; initLevel(); }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#333";
        platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
        ctx.fillStyle = "#e74c3c";
        spikes.forEach(s => {
            ctx.beginPath();
            ctx.moveTo(s.x, s.y + s.h);
            ctx.lineTo(s.x + s.w / 2, s.y);
            ctx.lineTo(s.x + s.w, s.y + s.h);
            ctx.fill();
        });
        coins.forEach(c => {
            if (!c.collected) {
                ctx.fillStyle = "#f1c40f";
                ctx.beginPath();
                ctx.arc(c.x + 15, c.y + 15, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#333";
                ctx.font = "bold 12px Arial";
                ctx.textAlign = "center";
                ctx.fillText(c.text, c.x + 15, c.y - 10);
            }
        });
        ctx.fillStyle = doorOpen ? "#ff7bac" : "#ccc";
        ctx.fillRect(doorPos.x, doorPos.y, 40, 70);
        ctx.strokeRect(doorPos.x, doorPos.y, 40, 70);
        ctx.fillStyle = "#4ea5ff";
        ctx.fillRect(player.x, player.y, player.size, player.size);
        ctx.strokeRect(player.x, player.y, player.size, player.size);
        ctx.fillStyle = "black";
        ctx.fillRect(player.x + 6, player.y + 8, 4, 4);
        ctx.fillRect(player.x + 20, player.y + 8, 4, 4);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
</script>

</body>
</html>
